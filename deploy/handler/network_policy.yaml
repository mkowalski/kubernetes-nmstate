---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-metrics
  namespace: {{ .HandlerNamespace }}
spec:
  podSelector:
    matchLabels:
      app: kubernetes-nmstate-operator
      component: kubernetes-nmstate-metrics
  ingress:
  - ports:
    - protocol: TCP
      port: metrics
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-webhook
  namespace: {{ .HandlerNamespace }}
spec:
  podSelector:
    matchLabels:
      app: kubernetes-nmstate-operator
      component: kubernetes-nmstate-webhook
  ingress:
    - ports:
        - protocol: TCP
          port: webhook-server
  policyTypes:
    - Ingress
